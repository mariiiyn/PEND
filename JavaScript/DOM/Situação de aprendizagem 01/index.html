<!DOCTYPE html>
<html lang="pt-br">

<head>
    
    <meta charset="UTF-8">
    <title>Cadastro</title>
    <!-- link do CSS-->
    <link rel="stylesheet" href="style.css">
    <!-- link do Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

</head>
<body>
    <!--formulário de cadastro-->
    <h2>Cadastro de Usuário</h2>

    <form>  
        <!--Campos do formulário-->
        <div class="form-group">      
            <input type="text" id="nome"  placeholder="Digite seu nome"  ><br><br>
            <input type="text" id="email" placeholder="Digite seu email"><br><br>
            <input type="password" id="senha" placeholder  ="Digite sua senha">
            <!-- Ícone para mostrar/esconder senha -->
            <i class="bi bi-eye-fill icone" id="botaoSenha"></i> <br><br>
            <input type="password" id="confirmar" placeholder  ="Confirme sua senha">
            <i class="bi bi-eye-fill icone" id="botaoConfirmar"></i> <br><br>
            <p id="mensagem-senha"></p>
            <input type="text" id="telefone" placeholder="Digite seu telefone"><br><br>
          
            <!-- Botão para adicionar mais campos de telefone -->
            <button type="button" id="ADDtelefone">➕</button><br><br>
            
        <button type="button" id="cadastrar">Cadastrar</button>
<!-- Mensagem de feedback -->
        <p id="mensagem"></p>
        </div>

        

    </form>
    <!-- Script do JavaScript -->
    <script src="script.js"></script>

</body>

</html>
